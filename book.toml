[book]
title = "TI-84 Plus OS — Reverse Engineering"
authors = ["ti84-re"]
description = "Reverse-engineering notes for the TI-84 Plus calculator OS (2.55MP), a Z80 system."
src = "docs"
language = "en"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
no-section-label = false
mathjax-support = false
additional-css = ["katex.min.css", "pseudocode.min.css"]
additional-js = ["mermaid.min.js", "mermaid-init.js", "hljs-z80.js", "katex.min.js", "katex-auto-render.min.js", "katex-init.js", "pseudocode.min.js", "pseudocode-init.js"]

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true

[output.html.playground]
runnable = false

[preprocessor]

[preprocessor.mermaid]
command = "mdbook-mermaid"
